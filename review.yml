actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Accurate's public API (Accurate API v3)
    is request/response REST over HTTPS, and its only asynchronous delivery is
    webhook HTTP callbacks. No AsyncAPI document was created because there is no
    server-push WebSocket/streaming transport on Accurate's own API to model. An
    OpenAPI document was authored from the published documentation covering the
    documented REST endpoints.
