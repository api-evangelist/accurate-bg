    type: Documentation
  - url: https://accurate.readme.io/reference
    type: APIReference
  - url: openapi/accurate-bg-openapi.yml
    type: OpenAPI
  description: Create, retrieve, list, and update the candidates (screening subjects)
    that background checks are run against. A candidate is created first and then
    referenced in an order-creation payload; candidate updates apply to future
    orders only.
- aid: accurate-bg:accurate-bg-orders-api
  name: Accurate Orders API
  tags:
  - Orders
  - Background Checks
  - Workflow
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://accurate.readme.io/reference
  baseURL: https://api.accuratebackground.com/v3
