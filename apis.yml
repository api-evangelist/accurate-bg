    type: OpenAPI
  description: Place and manage background-check orders against a candidate - create
    an order for a chosen package, list and retrieve orders, check estimated
    completion time (ETA), review order changes, reinitiate cancelled interactive
    orders, and resend candidate invitations.
- aid: accurate-bg:accurate-bg-packages-api
