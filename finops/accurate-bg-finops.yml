meters:
- name: screenings_ordered
  description: Background-check orders placed, billed per ordered package.
  unit: orders
  aggregation: sum
  dimensions:
  - account
  - package
- name: searches_run
  description: Individual searches within an order (criminal, verification, drug, MVR, international, etc.), each billable.
  unit: searches
  aggregation: sum
  dimensions:
  - account
  - search_type
- name: pass_through_fees
  description: Court-access, verification, and third-party pass-through fees incurred fulfilling a screening.
  unit: fees
  aggregation: sum
  dimensions:
  - account
  - jurisdiction
principles:
- name: Visibility
  description: Track orders and searches per account and package; separate base screening cost from pass-through court/verification fees.
- name: Allocation
  description: Tag orders to the requisition, team, or client so screening spend maps to internal cost centers.
- name: Optimization
  description: Right-size packages to role/jurisdiction to avoid unnecessary searches; use candidate-data collection workflows to reduce reruns; adjudicate via API to cut manual review cost.
- name: Accountability
  description: Assign owners per hiring program; review monthly screening volume and pass-through fees against budget.
