description: >-
  FinOps view of Accurate Background spend. Cost is driven by consumption of
  screening services, not by API calls: each ordered package and each individual
  search (criminal, SSN trace, employment/education verification, drug/health,
  MVR, identity/work authorization, international) is a billable unit, plus
  pass-through court, verification, and third-party access fees. The developer
  account and sandbox are free; production billing accrues per screening under a
  services agreement. There is no separate metered API/platform fee in the public
  documentation.
notes: >-
  Per-unit screening prices are not publicly listed and vary by package,
  jurisdiction, and pass-through fees; reconcile with Accurate. The largest and
  most variable cost drivers are court-access and verification pass-through fees
  on order volume.
